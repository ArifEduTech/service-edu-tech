<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistem Manajemen - ARIF EDU TECH</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        :root { --primary: #007bff; --success: #28a745; --danger: #dc3545; --dark: #343a40; }
        body { font-family: 'Segoe UI', Arial, sans-serif; background: #f0f2f5; margin: 0; padding: 20px; color: var(--dark); }
        .container { max-width: 900px; margin: auto; background: white; padding: 25px; border-radius: 12px; box-shadow: 0 5px 15px rgba(0,0,0,0.1); }
        
        header { text-align: center; border-bottom: 3px solid var(--primary); margin-bottom: 25px; padding-bottom: 10px; }
        .logo-placeholder { font-size: 28px; font-weight: bold; color: var(--primary); }
        
        .card { border: 1px solid #ddd; padding: 20px; border-radius: 8px; margin-bottom: 20px; background: #fafafa; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        label { display: block; font-weight: bold; margin-bottom: 5px; font-size: 14px; }
        input, select, textarea { width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 5px; box-sizing: border-box; margin-bottom: 10px; }
        
        .btn { padding: 12px 20px; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; transition: 0.3s; }
        .btn-primary { background: var(--primary); color: white; width: 100%; }
        .btn-success { background: var(--success); color: white; }
        .btn-danger { background: var(--danger); color: white; padding: 5px 10px; font-size: 12px; }

        table { width: 100%; border-collapse: collapse; margin-top: 15px; background: white; }
        table, th, td { border: 1px solid #ddd; }
        th, td { padding: 12px; text-align: left; }
        th { background: #eee; }

        .status-badge { padding: 5px 10px; border-radius: 15px; font-size: 12px; color: white; font-weight: bold; }
        .status-ceking { background: #6c757d; }
        .status-proses { background: #ffc107; color: black; }
        .status-selesai { background: var(--success); }

        #printArea { display: none; }

        @media print {
            body * { visibility: hidden; }
            #printArea, #printArea * { visibility: visible; }
            #printArea { display: block; position: absolute; left: 0; top: 0; width: 100%; }
            .no-print { display: none; }
        }

        /* Tracking View */
        #trackingView { text-align: center; padding: 40px; }
        .step-container { display: flex; justify-content: space-between; margin: 30px 0; position: relative; }
        .step { z-index: 2; background: white; border: 2px solid #ddd; border-radius: 50%; width: 40px; height: 40px; line-height: 40px; }
        .step.active { border-color: var(--primary); background: var(--primary); color: white; }
    </style>
</head>
<body>

<div id="mainApp" class="container no-print">
    <header>
        <div class="logo-placeholder">ARIF EDU TECH</div>
        <p>Solusi Perbaikan & Sparepart Komputer</p>
    </header>

    <div class="card">
        <h3>Input Data Masuk</h3>
        <div class="grid">
            <div>
                <label>Nama Pelanggan</label>
                <input type="text" id="custName" placeholder="Masukkan nama...">
            </div>
            <div>
                <label>Tanggal</label>
                <input type="date" id="entryDate">
            </div>
        </div>

        <label>Jenis Layanan</label>
        <select id="layananType" onchange="toggleForm()">
            <option value="service">Service (Laptop/PC/Printer)</option>
            <option value="produk">Pembelian Produk</option>
        </select>

        <div id="formService">
            <div class="grid">
                <div>
                    <label>Nama Barang / Perangkat</label>
                    <input type="text" id="devName" placeholder="Contoh: Laptop Asus A45V">
                </div>
                <div>
                    <label>Keluhan</label>
                    <input type="text" id="keluhan" placeholder="Contoh: Mati Total">
                </div>
            </div>
            <label>Estimasi Selesai</label>
            <input type="text" id="estimasi" placeholder="Contoh: 2-3 Hari">
        </div>

        <div id="formProduk" style="display:none;">
            <label>Jenis Produk / Nama Barang</label>
            <input type="text" id="prodName" placeholder="Contoh: SSD 256GB Samsung">
            <div class="grid">
                <input type="number" id="prodPrice" placeholder="Harga Satuan">
                <input type="number" id="prodQty" placeholder="Jumlah">
            </div>
        </div>

        <button class="btn btn-primary" onclick="simpanData()">SIMPAN & CETAK TANDA TERIMA</button>
    </div>

    <div class="card">
        <h3>Daftar Pekerjaan & Transaksi</h3>
        <div style="overflow-x: auto;">
            <table>
                <thead>
                    <tr>
                        <th>Pelanggan</th>
                        <th>Info Barang</th>
                        <th>Status</th>
                        <th>Aksi</th>
                    </tr>
                </thead>
                <tbody id="dbBody"></tbody>
            </table>
        </div>
    </div>
</div>

<div id="printArea">
    <div style="text-align:center; border-bottom: 2px solid #000; padding-bottom:10px;">
        <h2>ARIF EDU TECH</h2>
        <p>Jl. Contoh No. 123 | WA: 0812-XXXX-XXXX</p>
    </div>
    <div id="notaKonten" style="padding:20px;"></div>
    <div id="qrcode" style="display: flex; justify-content: center; margin: 20px 0;"></div>
    <p style="text-align:center; font-size:12px;">Scan QR ini untuk cek progres pengerjaan secara berkala.</p>
</div>

<script>
    let database = JSON.parse(localStorage.getItem('arif_db')) || [];

    // Inisialisasi Tanggal
    document.getElementById('entryDate').value = new Date().toISOString().split('T')[0];

    function toggleForm() {
        const type = document.getElementById('layananType').value;
        document.getElementById('formService').style.display = type === 'service' ? 'block' : 'none';
        document.getElementById('formProduk').style.display = type === 'produk' ? 'block' : 'none';
    }

    function simpanData() {
        const type = document.getElementById('layananType').value;
        const data = {
            id: "TRX-" + Date.now(),
            nama: document.getElementById('custName').value,
            tgl: document.getElementById('entryDate').value,
            tipe: type,
            status: 'ceking',
            items: [],
            keterangan: ""
        };

        if(type === 'service') {
            data.barang = document.getElementById('devName').value;
            data.keluhan = document.getElementById('keluhan').value;
            data.estimasi = document.getElementById('estimasi').value;
        } else {
            const pName = document.getElementById('prodName').value;
            const pPrice = document.getElementById('prodPrice').value;
            const pQty = document.getElementById('prodQty').value;
            data.items.push({ desc: pName, price: pPrice, qty: pQty, total: pPrice * pQty });
            data.status = 'selesai';
        }

        if(!data.nama) return alert("Nama harus diisi!");
        
        database.push(data);
        localStorage.setItem('arif_db', JSON.stringify(database));
        renderTable();
        cetakNota(data);
    }

    function renderTable() {
        const body = document.getElementById('dbBody');
        body.innerHTML = '';
        database.forEach((d, index) => {
            body.innerHTML += `
                <tr>
                    <td>${d.nama}<br><small>${d.tgl}</small></td>
                    <td>${d.tipe === 'service' ? d.barang : d.items[0].desc}</td>
                    <td><span class="status-badge status-${d.status}">${d.status}</span></td>
                    <td>
                        <button onclick="updateStatus('${d.id}')" class="btn btn-success" style="padding:5px">Update</button>
                        <button onclick="hapusData(${index})" class="btn btn-danger">Hapus</button>
                    </td>
                </tr>
            `;
        });
    }

    function updateStatus(id) {
        const item = database.find(i => i.id === id);
        const newStatus = prompt("Ubah Status (ceking/proses/selesai):", item.status);
        if(newStatus) {
            item.status = newStatus.toLowerCase();
            if(item.status === 'selesai' && item.tipe === 'service') {
                const addPart = confirm("Pekerjaan Selesai. Tambahkan rincian biaya/sparepart?");
                if(addPart) {
                    const desc = prompt("Nama Service/Sparepart:");
                    const harga = prompt("Harga:");
                    item.items.push({ desc: desc, price: harga, qty: 1, total: harga });
                }
            }
            localStorage.setItem('arif_db', JSON.stringify(database));
            renderTable();
            alert("Status berhasil diupdate! Pelanggan bisa cek via QR.");
        }
    }

    function cetakNota(data) {
        let detail = `
            <table style="width:100%; border:none;">
                <tr><td>ID TRX</td><td>: ${data.id}</td></tr>
                <tr><td>Pelanggan</td><td>: ${data.nama}</td></tr>
                <tr><td>Tanggal</td><td>: ${data.tgl}</td></tr>
            </table>
            <hr>
            <h4>Rincian:</h4>
            <p>${data.tipe === 'service' ? 'Barang: ' + data.barang + '<br>Keluhan: ' + data.keluhan : 'Pembelian Produk'}</p>
        `;

        if(data.items.length > 0) {
            detail += `<table><tr><th>Item</th><th>Qty</th><th>Harga</th></tr>`;
            data.items.forEach(i => {
                detail += `<tr><td>${i.desc}</td><td>${i.qty}</td><td>Rp ${parseInt(i.total).toLocaleString()}</td></tr>`;
            });
            detail += `</table>`;
        }

        document.getElementById('notaKonten').innerHTML = detail;
        
        // Link Tracking: Mengirim data terenkripsi lewat URL agar HP bisa baca
        const trackData = btoa(JSON.stringify({ n: data.nama, b: data.barang || "Produk", s: data.id }));
        const trackUrl = window.location.origin + window.location.pathname + "?track=" + trackData;

        document.getElementById('qrcode').innerHTML = "";
        new QRCode(document.getElementById("qrcode"), { text: trackUrl, width: 160, height: 160 });

        setTimeout(() => { window.print(); }, 500);
    }

    function hapusData(index) {
        if(confirm("Hapus data ini?")) {
            database.splice(index, 1);
            localStorage.setItem('arif_db', JSON.stringify(database));
            renderTable();
        }
    }

    // LOGIKA TRACKING UNTUK HP PELANGGAN
    window.onload = () => {
        renderTable();
        const urlParams = new URLSearchParams(window.location.search);
        if(urlParams.has('track')) {
            const rawData = JSON.parse(atob(urlParams.get('track')));
            // Cari status terbaru dari database jika dibuka di perangkat yang sama
            // Namun karena ini tanpa server, kita tampilkan data dari QR saja.
            document.body.innerHTML = `
                <div id="trackingView">
                    <h1 style="color:var(--primary)">ARIF EDU TECH</h1>
                    <div class="card">
                        <h2>Halo, ${rawData.n}</h2>
                        <p>Status pengerjaan untuk <strong>${rawData.b}</strong></p>
                        <hr>
                        <div class="step-container">
                            <div class="step active">1</div>
                            <div class="step">2</div>
                            <div class="step">3</div>
                        </div>
                        <p>Silahkan hubungi admin untuk update progres real-time ID: <br><strong>${rawData.s}</strong></p>
                        <a href="https://wa.me/628123456789" class="btn btn-success" style="text-decoration:none; display:inline-block;">Tanya Admin (WA)</a>
                    </div>
                </div>
            `;
        }
    }
</script>
</body>
</html>
