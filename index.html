<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistem Manajemen - ARIF EDU TECH</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        :root { --primary: #007bff; --success: #28a745; --warning: #ffc107; --danger: #dc3545; --dark: #343a40; }
        body { font-family: 'Segoe UI', Arial, sans-serif; background: #f4f6f9; margin: 0; padding: 10px; color: var(--dark); }
        .container { max-width: 1000px; margin: auto; background: white; padding: 20px; border-radius: 10px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        header { text-align: center; border-bottom: 3px solid var(--primary); margin-bottom: 20px; padding-bottom: 10px; }
        .logo { font-size: 26px; font-weight: bold; color: var(--primary); }
        
        .card { border: 1px solid #eee; padding: 15px; border-radius: 8px; margin-bottom: 20px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 15px; margin-bottom: 10px; }
        label { display: block; font-weight: bold; margin-bottom: 5px; font-size: 13px; }
        input, select, textarea { width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; }
        
        .btn { padding: 10px 15px; border: none; border-radius: 4px; cursor: pointer; font-weight: bold; transition: 0.2s; text-transform: uppercase; font-size: 12px; }
        .btn-blue { background: var(--primary); color: white; }
        .btn-green { background: var(--success); color: white; }
        .btn-yellow { background: var(--warning); color: black; }
        .btn-red { background: var(--danger); color: white; }

        table { width: 100%; border-collapse: collapse; margin-top: 10px; font-size: 13px; }
        th, td { border: 1px solid #ddd; padding: 10px; text-align: left; }
        th { background: #f8f9fa; }

        .badge { padding: 4px 8px; border-radius: 12px; font-size: 11px; color: white; font-weight: bold; }
        .bg-ceking { background: #6c757d; }
        .bg-proses { background: var(--warning); color: black; }
        .bg-selesai { background: var(--success); }

        #modalNota { display:none; position: fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.7); z-index:100; overflow-y: auto; }
        .modal-content { background:white; max-width:600px; margin: 20px auto; padding:20px; border-radius:8px; }

        @media print {
            .no-print { display: none !important; }
            #printArea { display: block !important; padding: 0; }
            body { background: white; }
        }
        #printArea { display: none; }
    </style>
</head>
<body>

<div class="container no-print">
    <header>
        <div class="logo">ARIF EDU TECH</div>
        <p style="margin:0; font-size:12px;">Pusat Service & Sparepart Profesional</p>
    </header>

    <div class="card">
        <h3 style="margin-top:0;">1. Registrasi Pelanggan Masuk</h3>
        <div class="grid">
            <div>
                <label>Nama Pelanggan</label>
                <input type="text" id="custName" placeholder="Nama Lengkap">
            </div>
            <div>
                <label>Tanggal Masuk</label>
                <input type="date" id="entryDate">
            </div>
            <div>
                <label>Jenis Layanan</label>
                <select id="layananType" onchange="toggleForm()">
                    <option value="service">Service (Laptop/Printer/PC)</option>
                    <option value="produk">Pembelian Produk</option>
                </select>
            </div>
        </div>

        <div id="sectionService">
            <div class="grid">
                <div>
                    <label>Nama Barang / Perangkat</label>
                    <input type="text" id="devName" placeholder="Contoh: Laptop HP G4">
                </div>
                <div>
                    <label>Keluhan</label>
                    <input type="text" id="keluhan" placeholder="Contoh: Keyboard Error">
                </div>
                <div>
                    <label>Estimasi Selesai</label>
                    <input type="text" id="estimasi" placeholder="Contoh: Besok Siang">
                </div>
            </div>
        </div>
        <button class="btn btn-blue" style="width:100%; margin-top:10px;" onclick="simpanAwal()">SIMPAN DATA & CETAK TANDA TERIMA</button>
    </div>

    <div class="card">
        <h3 style="margin-top:0;">2. Database & Progres Pekerjaan</h3>
        <div style="overflow-x: auto;">
            <table>
                <thead>
                    <tr>
                        <th>Pelanggan</th>
                        <th>Barang/Produk</th>
                        <th>Status</th>
                        <th>Aksi</th>
                    </tr>
                </thead>
                <tbody id="dbBody"></tbody>
            </table>
        </div>
    </div>
</div>

<div id="modalNota" class="no-print">
    <div class="modal-content">
        <h3>Input Rincian Biaya & Sparepart</h3>
        <p id="targetCustomer" style="font-weight:bold; color:var(--primary);"></p>
        <div id="itemInputs">
            <div class="grid" style="grid-template-columns: 2fr 0.5fr 1fr; margin-bottom:5px;">
                <label>Deskripsi (Service/Part)</label>
                <label>Qty</label>
                <label>Harga Satuan</label>
            </div>
            <div id="itemRows">
                </div>
        </div>
        <button class="btn btn-yellow" onclick="addRow()">+ Tambah Item/Sparepart</button>
        <hr>
        <label>Jenis Pembayaran</label>
        <select id="payMethod">
            <option>Tunai</option>
            <option>Transfer Bank</option>
            <option>QRIS</option>
        </select>
        <div style="margin-top:20px; display:flex; gap:10px;">
            <button class="btn btn-green" style="flex:1;" onclick="generateNotaFinal()">CETAK NOTA FINAL (LUNAS)</button>
            <button class="btn btn-red" onclick="closeModal()">BATAL</button>
        </div>
    </div>
</div>

<div id="printArea">
    <div style="text-align:center; border-bottom: 2px solid #000; padding-bottom:10px;">
        <h2 style="margin:0;">ARIF EDU TECH</h2>
        <p style="margin:0; font-size:12px;">Solusi Teknologi & Edukasi | WA: 08xx-xxxx-xxxx</p>
    </div>
    <div id="notaContent" style="margin-top:15px; font-size:14px;"></div>
    <div id="qrPrint" style="display:flex; justify-content:center; margin:15px 0;"></div>
    <p style="text-align:center; font-size:10px;">Terima kasih atas kepercayaan Anda.</p>
</div>

<script>
    let database = JSON.parse(localStorage.getItem('arif_tech_db')) || [];
    let currentEditId = null;

    document.getElementById('entryDate').value = new Date().toISOString().split('T')[0];

    function toggleForm() {
        const type = document.getElementById('layananType').value;
        document.getElementById('sectionService').style.display = type === 'service' ? 'block' : 'none';
    }

    function simpanAwal() {
        const name = document.getElementById('custName').value;
        const type = document.getElementById('layananType').value;
        if(!name) return alert("Nama wajib diisi!");

        const data = {
            id: "ARF-" + Date.now().toString().slice(-6),
            nama: name,
            tgl: document.getElementById('entryDate').value,
            tipe: type,
            barang: type === 'service' ? document.getElementById('devName').value : "Produk Retail",
            keluhan: document.getElementById('keluhan').value || "-",
            estimasi: document.getElementById('estimasi').value || "-",
            status: type === 'service' ? 'ceking' : 'selesai',
            items: [],
            total: 0,
            bayar: "Belum Bayar"
        };

        database.push(data);
        saveDB();
        renderTable();
        printTandaTerima(data);
    }

    function renderTable() {
        const body = document.getElementById('dbBody');
        body.innerHTML = '';
        database.forEach((d) => {
            body.innerHTML += `
                <tr>
                    <td><strong>${d.nama}</strong><br><small>${d.id}</small></td>
                    <td>${d.barang}</td>
                    <td><span class="badge bg-${d.status}">${d.status.toUpperCase()}</span></td>
                    <td>
                        <button class="btn btn-yellow" style="padding:5px" onclick="changeStatus('${d.id}')">Status</button>
                        <button class="btn btn-green" style="padding:5px" onclick="openNotaModal('${d.id}')">Nota Final</button>
                        <button class="btn btn-red" style="padding:5px" onclick="hapus('${d.id}')">X</button>
                    </td>
                </tr>
            `;
        });
    }

    function changeStatus(id) {
        const item = database.find(x => x.id === id);
        const next = { 'ceking': 'proses', 'proses': 'selesai', 'selesai': 'ceking' };
        item.status = next[item.status];
        saveDB();
        renderTable();
        alert("Status Update: " + item.status.toUpperCase());
    }

    function openNotaModal(id) {
        currentEditId = id;
        const item = database.find(x => x.id === id);
        document.getElementById('targetCustomer').innerText = "Input Biaya untuk: " + item.nama;
        document.getElementById('itemRows').innerHTML = '';
        addRow(); // Start with one row
        document.getElementById('modalNota').style.display = 'block';
    }

    function addRow() {
        const div = document.createElement('div');
        div.className = 'grid';
        div.style.gridTemplateColumns = '2fr 0.5fr 1fr';
        div.innerHTML = `
            <input type="text" class="i-desc" placeholder="Contoh: Service IC Power">
            <input type="number" class="i-qty" value="1">
            <input type="number" class="i-price" placeholder="Harga">
        `;
        document.getElementById('itemRows').appendChild(div);
    }

    function generateNotaFinal() {
        const item = database.find(x => x.id === currentEditId);
        const rows = document.querySelectorAll('#itemRows .grid');
        item.items = [];
        let grandTotal = 0;

        rows.forEach(row => {
            const d = row.querySelector('.i-desc').value;
            const q = row.querySelector('.i-qty').value;
            const p = row.querySelector('.i-price').value;
            if(d && p) {
                const sub = q * p;
                item.items.push({ desc: d, qty: q, price: p, sub: sub });
                grandTotal += sub;
            }
        });

        item.total = grandTotal;
        item.status = 'selesai';
        item.bayar = document.getElementById('payMethod').value;
        
        saveDB();
        renderTable();
        closeModal();
        printNotaFinal(item);
    }

    function printTandaTerima(data) {
        const html = `
            <h3 style="text-align:center;">TANDA TERIMA SERVICE</h3>
            <p>ID: ${data.id} | Tgl: ${data.tgl}</p>
            <p>Pelanggan: <b>${data.nama}</b></p>
            <p>Barang: ${data.barang}</p>
            <p>Keluhan: ${data.keluhan}</p>
            <p>Estimasi: ${data.estimasi}</p>
            <p>Status Awal: <b>${data.status}</b></p>
        `;
        doPrint(html, data);
    }

    function printNotaFinal(data) {
        let html = `
            <h3 style="text-align:center;">NOTA LUNAS</h3>
            <p>ID: ${data.id} | Pelanggan: <b>${data.nama}</b></p>
            <p>Barang: ${data.barang}</p>
            <hr>
            <table style="width:100%; border:none;">
                <tr style="border-bottom:1px solid #000;"><th>Item</th><th>Qty</th><th>Total</th></tr>
        `;
        data.items.forEach(i => {
            html += `<tr><td>${i.desc}</td><td>${i.qty}</td><td>Rp ${parseInt(i.sub).toLocaleString()}</td></tr>`;
        });
        html += `</table>
            <h3 style="text-align:right;">TOTAL: Rp ${parseInt(data.total).toLocaleString()}</h3>
            <p>Metode Bayar: ${data.bayar} (LUNAS)</p>
        `;
        doPrint(html, data);
    }

    function doPrint(html, data) {
        document.getElementById('notaContent').innerHTML = html;
        document.getElementById('qrPrint').innerHTML = "";
        
        // Link Tracking (Membawa Data Status)
        const trackStr = btoa(JSON.stringify({n: data.nama, id: data.id, st: data.status, b: data.barang}));
        const link = window.location.origin + window.location.pathname + "?track=" + trackStr;
        
        new QRCode(document.getElementById("qrPrint"), { text: link, width: 140, height: 140 });
        
        setTimeout(() => { window.print(); }, 500);
    }

    function saveDB() { localStorage.setItem('arif_tech_db', JSON.stringify(database)); }
    function closeModal() { document.getElementById('modalNota').style.display = 'none'; }
    function hapus(id) { if(confirm("Hapus data?")) { database = database.filter(x => x.id !== id); saveDB(); renderTable(); } }

    // TRACKING HANDLER (UNTUK HP PELANGGAN)
    window.onload = () => {
        renderTable();
        const params = new URLSearchParams(window.location.search);
        if(params.has('track')) {
            const d = JSON.parse(atob(params.get('track')));
            document.body.innerHTML = `
                <div style="text-align:center; padding:50px; font-family:sans-serif;">
                    <h1 style="color:var(--primary);">ARIF EDU TECH</h1>
                    <div style="border:1px solid #ddd; padding:20px; border-radius:10px; background:white;">
                        <h2>Status Progres</h2>
                        <p>ID: ${d.id} | Pelanggan: ${d.n}</p>
                        <hr>
                        <h1 style="color:var(--success);">${d.st.toUpperCase()}</h1>
                        <p>Unit: ${d.b}</p>
                        <hr>
                        <p>Silahkan hubungi admin untuk info lebih lanjut.</p>
                        <button onclick="location.href=window.location.origin">Ke Web Utama</button>
                    </div>
                </div>
            `;
        }
    }
</script>
</body>
</html>
