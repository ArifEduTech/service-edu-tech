<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistem Kasir - ARIF EDU TECH</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
</head>
<body>

<div class="container no-print">
    <header>
        <h1>ARIF EDU TECH</h1>
        <p>Manajemen Layanan Lokal Storage</p>
    </header>

    <section class="form-section">
        <h3>Input Layanan Baru</h3>
        <div class="grid">
            <input type="text" id="customerName" placeholder="Nama Pelanggan">
            <input type="date" id="entryDate">
            <select id="serviceType" onchange="toggleDeviceOptions()">
                <option value="Service">Service</option>
                <option value="Produk">Pembelian Produk</option>
            </select>
            <select id="deviceType">
                <option value="-">- Pilih Perangkat -</option>
                <option value="Laptop">Laptop</option>
                <option value="Printer">Printer</option>
                <option value="PC">PC / Desktop</option>
            </select>
        </div>

        <div class="status-group">
            <strong>Status:</strong>
            <label><input type="radio" name="status" value="Ceking" checked> Ceking</label>
            <label><input type="radio" name="status" value="Proses"> Proses</label>
            <label><input type="radio" name="status" value="Selesai"> Selesai</label>
        </div>

        <div class="grid-nota">
            <input type="number" id="qty" placeholder="Qty" oninput="calculateRow()">
            <input type="text" id="desc" placeholder="Deskripsi/Barang">
            <input type="number" id="price" placeholder="Harga Satuan" oninput="calculateRow()">
            <input type="text" id="totalRow" placeholder="Total" readonly>
        </div>
        <button onclick="saveAndPrint()" class="btn-primary">Buat Nota & Simpan ke Database Browser</button>
    </section>

    <hr>

    <section class="history-section">
        <h3>Riwayat Layanan (Tersimpan)</h3>
        <table id="historyTable" border="1" style="width:100%; border-collapse: collapse; text-align: left;">
            <thead>
                <tr style="background: #eee;">
                    <th>Tanggal</th>
                    <th>Nama</th>
                    <th>Layanan</th>
                    <th>Total</th>
                    <th>Status</th>
                    <th>Aksi</th>
                </tr>
            </thead>
            <tbody id="historyBody"></tbody>
        </table>
        <button onclick="clearAllData()" style="margin-top: 10px; background: #dc3545; color: white; border:none; padding: 5px 10px; cursor:pointer; border-radius: 4px;">Hapus Semua Riwayat</button>
    </section>
</div>

<div id="printArea" class="print-only">
    <div style="text-align: center; border-bottom: 2px dashed #000; padding-bottom: 10px;">
        <h2 style="margin:0;">ARIF EDU TECH</h2>
        <p style="margin:0; font-size: 12px;">Solusi IT & Edukasi Terpercaya</p>
    </div>
    <div id="notaContent" style="margin-top: 15px; font-size: 14px;"></div>
    <div id="qrcode"></div>
    <p style="text-align: center; font-size: 10px; margin-top: 20px;">Nota ini adalah bukti sah layanan.<br>Scan QR untuk cek status.</p>
</div>

<script>
    // Load data saat halaman dibuka
    document.addEventListener('DOMContentLoaded', () => {
        const today = new Date().toISOString().split('T')[0];
        document.getElementById('entryDate').value = today;
        renderHistory();
    });

    function toggleDeviceOptions() {
        const type = document.getElementById('serviceType').value;
        document.getElementById('deviceType').disabled = (type !== 'Service');
    }

    function calculateRow() {
        const qty = document.getElementById('qty').value || 0;
        const price = document.getElementById('price').value || 0;
        document.getElementById('totalRow').value = qty * price;
    }

    function saveAndPrint() {
        const data = {
            id: Date.now(),
            name: document.getElementById('customerName').value,
            date: document.getElementById('entryDate').value,
            service: document.getElementById('serviceType').value,
            device: document.getElementById('deviceType').value,
            status: document.querySelector('input[name="status"]:checked').value,
            desc: document.getElementById('desc').value,
            total: document.getElementById('totalRow').value
        };

        if(!data.name || !data.total) return alert("Lengkapi nama dan rincian!");

        // Simpan ke LocalStorage
        let history = JSON.parse(localStorage.getItem('arifEduHistory')) || [];
        history.push(data);
        localStorage.setItem('arifEduHistory', JSON.stringify(history));

        renderHistory();
        prepareNota(data);
        window.print();
    }

    function renderHistory() {
        const history = JSON.parse(localStorage.getItem('arifEduHistory')) || [];
        const body = document.getElementById('historyBody');
        body.innerHTML = '';

        history.forEach((item) => {
            body.innerHTML += `
                <tr>
                    <td>${item.date}</td>
                    <td>${item.name}</td>
                    <td>${item.service} ${item.device !== '-' ? item.device : ''}</td>
                    <td>Rp ${parseInt(item.total).toLocaleString()}</td>
                    <td><strong>${item.status}</strong></td>
                    <td><button onclick="deleteRow(${item.id})">Hapus</button></td>
                </tr>
            `;
        });
    }

    function prepareNota(data) {
        const content = `
            <table style="width:100%">
                <tr><td>Nama</td><td>: ${data.name}</td></tr>
                <tr><td>Tgl Masuk</td><td>: ${data.date}</td></tr>
                <tr><td>Layanan</td><td>: ${data.service} (${data.device})</td></tr>
                <tr><td>Status</td><td>: <strong>${data.status}</strong></td></tr>
            </table>
            <hr>
            <p><strong>Item:</strong> ${data.desc}</p>
            <h3 style="text-align:right;">Total: Rp ${parseInt(data.total).toLocaleString()}</h3>
        `;
        document.getElementById('notaContent').innerHTML = content;
        
        document.getElementById('qrcode').innerHTML = "";
        new QRCode(document.getElementById("qrcode"), {
            text: `https://arifedutech.vercel.app/track?id=${data.id}`,
            width: 120,
            height: 120
        });
    }

    function deleteRow(id) {
        let history = JSON.parse(localStorage.getItem('arifEduHistory'));
        history = history.filter(item => item.id !== id);
        localStorage.setItem('arifEduHistory', JSON.stringify(history));
        renderHistory();
    }

    function clearAllData() {
        if(confirm("Hapus semua data riwayat?")) {
            localStorage.removeItem('arifEduHistory');
            renderHistory();
        }
    }
</script>
</body>
</html>
